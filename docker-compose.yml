services:
    app:
        build: .
        container_name: rpp
        restart: unless-stopped
        # Lets RPP_AI_BASE_URL use host.docker.internal to reach a service on the host (e.g. Ollama)
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - ./credentials:/app/credentials
            - ./instances:/app/instances
            - ./logs:/app/logs
            - ./maps:/app/maps
            # Optional: editable AI knowledge folder (slang, kits, strategy docs).
            # Drop .md/.txt/.json files here and edit live — no rebuild. Files with
            # the same name override the baked-in copies. Pair with RPP_AI_KNOWLEDGE_DIR.
            - ./knowledge:/app/knowledge
        environment:
            # --- Required ---
            - RPP_DISCORD_CLIENT_ID
            - RPP_DISCORD_TOKEN

            # --- AI assistant (!ai / /ai). OpenAI-compatible endpoint. ---
            # Disable entirely with RPP_AI_ENABLED=false
            - RPP_AI_ENABLED=true
            # Inside a container "localhost" is the container itself. Point this at your
            # Ollama / OpenAI / OpenRouter host. For Ollama on the TrueNAS host use the
            # host LAN IP, e.g. http://192.168.1.10:11434/v1
            - RPP_AI_BASE_URL=http://host.docker.internal:11434/v1
            - RPP_AI_API_KEY=
            - RPP_AI_MODEL=llama3.1
            # Allow the AI to physically toggle smart switches (OFF by default — opt in deliberately)
            # - RPP_AI_CONTROL_ENABLED=true
            # Editable knowledge folder (matches the ./knowledge volume above)
            - RPP_AI_KNOWLEDGE_DIR=/app/knowledge
            # - RPP_AI_MAX_TOKENS=1500
            # - RPP_AI_TEMPERATURE=0.3
            # - RPP_AI_TIMEOUT_MS=120000

            # --- Optional general settings (defaults shown) ---
            # - RPP_LANGUAGE=en
            # - RPP_POLLING_INTERVAL=10000
